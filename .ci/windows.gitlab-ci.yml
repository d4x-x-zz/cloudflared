# Windows build and test pipeline for cloudflared
# Handles building the Windows binary and running tests on Windows runners

.windows-defaults: &windows-defaults
  tags:
    - windows
  before_script:
    - $env:PATH = "C:\Go\bin;$env:PATH"
    - $env:GOPATH = "C:\Users\gitlab-runner\go"
    - $env:CGO_ENABLED = "1"
    - go version
    - go env

build-windows-amd64:
  <<: *windows-defaults
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - go build -v -ldflags "-X main.Version=$CI_COMMIT_TAG -X main.BuildTime=$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ss')" -o cloudflared-windows-amd64.exe ./cmd/cloudflared
  artifacts:
    paths:
      - cloudflared-windows-amd64.exe
    expire_in: 1 week

test-windows-amd64:
  <<: *windows-defaults
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - go test -v -count=1 -race ./...
  needs:
    - build-windows-amd64

build-windows-386:
  <<: *windows-defaults
  stage: build
  rules:
    - if: '$CI_COMMIT_TAG'
  variables:
    GOARCH: "386"
  script:
    - $env:GOARCH = "386"
    - go build -v -ldflags "-X main.Version=$CI_COMMIT_TAG -X main.BuildTime=$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ss')" -o cloudflared-windows-386.exe ./cmd/cloudflared
  artifacts:
    paths:
      - cloudflared-windows-386.exe
    expire_in: 1 week

package-windows-msi:
  <<: *windows-defaults
  stage: package
  rules:
    - if: '$CI_COMMIT_TAG'
  dependencies:
    - build-windows-amd64
  script:
    # Requires WiX Toolset installed on the runner
    - .\packaging\windows\build-msi.ps1 -Version $CI_COMMIT_TAG -Arch amd64
  artifacts:
    paths:
      - cloudflared-windows-amd64.msi
    expire_in: 1 month

sign-windows:
  <<: *windows-defaults
  stage: sign
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual
  dependencies:
    - package-windows-msi
    - build-windows-amd64
  script:
    - .\packaging\windows\sign.ps1 -Files @("cloudflared-windows-amd64.exe", "cloudflared-windows-amd64.msi")
  artifacts:
    paths:
      - cloudflared-windows-amd64.exe
      - cloudflared-windows-amd64.msi
    expire_in: 1 month
